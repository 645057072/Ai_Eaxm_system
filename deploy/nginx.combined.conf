# 单页应用 + API 反代（容器内 api:8000）
# 使用 Docker 内置 DNS 动态解析，避免 api 容器重启后仍指向旧 IP 导致 502

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 32m;

    proxy_connect_timeout 120s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # 变量形式 proxy_pass 会按请求时解析 api 主机名（须配合 resolver）
    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        # 上游短暂未就绪时重试一次，减轻首包 502
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /health {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_connect_timeout 15s;
        proxy_read_timeout 15s;
    }

    # 就绪检查（含数据库连通），排障：若 503 说明 api 未连上 MySQL
    location /health/ready {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_connect_timeout 15s;
        proxy_read_timeout 15s;
    }

    location ~ ^/(docs|redoc|openapi\.json) {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
