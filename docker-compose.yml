# 本地 / 单机 ECS：MySQL + Redis + API + Web（统一入口 80）
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: exam_db
      MYSQL_USER: exam
      MYSQL_PASSWORD: exam
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://exam:exam@mysql:3306/exam_db?charset=utf8mb4}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-change-me-docker-demo-only}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://47.93.44.247}
    expose:
      - "8000"
    # 仅本机可访问，便于在 ECS 上 curl 调试：curl -s http://127.0.0.1:8000/health
    ports:
      - "127.0.0.1:8000:8000"
    # 使用独立脚本 + 超时，避免 ECS 上冷启动/迁移较慢时误判 unhealthy
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 15s
      timeout: 12s
      retries: 25
      start_period: 300s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/nginx-frontend.Dockerfile
      args:
        VITE_API_BASE: /api
    ports:
      - "80:80"
    # 仅等待 api 容器已启动，不要求 healthy，避免迁移慢时 web 永远无法启动（此前会报 dependency failed）
    depends_on:
      api:
        condition: service_started

volumes:
  mysql_data:
