# 本地 / 单机 ECS：MySQL + Redis + API + Web（统一入口 80）
# 显式 bridge 网络，确保 api 能解析主机名 mysql、redis（勿省略 mysql 服务或拆分到不同 compose 项目）
networks:
  exam_internal:
    driver: bridge

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: exam_db
      MYSQL_USER: exam
      MYSQL_PASSWORD: exam
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 低内存调优（见 deploy/docker/mysql-low-memory.cnf）；退出码 137 多为宿主机 OOM。
      # 若机器内存 ≥4GB 且希望默认性能，可删除下一行挂载。
      - ./deploy/docker/mysql-low-memory.cnf:/etc/mysql/conf.d/low-memory.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - exam_internal

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - exam_internal

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 阿里云 ECS 上若清华源仍慢，可改为：https://mirrors.aliyun.com/pypi/simple/，TRUSTED_HOST 填 mirrors.aliyun.com
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    restart: unless-stopped
    environment:
      # 勿在宿主机 .env 写 DATABASE_URL= 空行；若用 RDS 请写完整内网地址。默认使用 compose 内服务名 mysql（须与 api 同网络）。
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://exam:exam@mysql:3306/exam_db?charset=utf8mb4}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-change-me-docker-demo-only}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://47.93.44.247}
      UPLOAD_ROOT: /app/uploads
      
      LLM_ENABLED: "1"
      LLM_API_BASE: "https://openrouter.ai/api/v1"  # 或您的网关
      LLM_API_KEY: "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"
      LLM_MODEL: "anthropic/claude-3.5-sonnet"


    volumes:
      - exam_uploads:/app/uploads
    expose:
      - "8000"
    # 仅本机可访问，便于在 ECS 上 curl 调试：curl -s http://127.0.0.1:8000/health
    ports:
      - "127.0.0.1:8000:8000"
    # 探活走 /health（轻量）；DB 在 entrypoint 的 wait_for_db + alembic 已验证，避免 /health/ready
    # 偶发连库慢导致 api 长期 unhealthy、web 无法 depends_on。
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker_healthcheck.py"]
      interval: 15s
      timeout: 15s
      retries: 25
      start_period: 120s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - exam_internal

 

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/nginx-frontend.Dockerfile
      args:
        VITE_API_BASE: /api
    ports:
      - "80:80"
    # 等 API 健康检查通过后再起 Nginx，避免冷启动迁移期间反代到未监听的端口导致 502
    depends_on:
      api:
        condition: service_healthy
    networks:
      - exam_internal

volumes:
  mysql_data:
  exam_uploads:
