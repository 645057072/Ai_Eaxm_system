# 本地 / 单机 ECS：MySQL + Redis + API + Web（统一入口 80）
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: exam_db
      MYSQL_USER: exam
      MYSQL_PASSWORD: exam
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://exam:exam@mysql:3306/exam_db?charset=utf8mb4}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-change-me-docker-demo-only}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://47.93.44.247}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/nginx-frontend.Dockerfile
      args:
        VITE_API_BASE: /api
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  mysql_data:
