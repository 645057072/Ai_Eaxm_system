# 推送 main 分支后，SSH 登录阿里云 ECS 拉取最新代码并执行 docker compose 部署
# 需在 GitHub 仓库 Settings -> Secrets and variables -> Actions 中配置：
#   ALIYUN_SSH_USER    例如 root 或 ecs-user
#   ALIYUN_SSH_PRIVATE_KEY  私钥全文（与 ECS 上 ~/.ssh/authorized_keys 对应，含 BEGIN/END 行）
# 服务器上代码目录默认为 /opt/exam-system（与 deploy/aliyun/ecs-first-setup.sh 一致）

name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-aliyun-ecs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: SSH 部署到 47.93.44.247
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 47.93.44.247
          username: ${{ secrets.ALIYUN_SSH_USER }}
          key: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 55m
          script: |
            set -euo pipefail
            export DEPLOY_ROOT=/opt/exam-system
            export BRANCH=main
            bash "$DEPLOY_ROOT/deploy/aliyun/remote-deploy.sh"
